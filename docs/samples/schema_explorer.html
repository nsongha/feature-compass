<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pickleball OS — Schema Explorer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f4f0;--sur:#fff;--sur2:#eeedea;--sur3:#e5e4e0;
  --bd:rgba(0,0,0,0.08);--bdm:rgba(0,0,0,0.15);--bds:rgba(0,0,0,0.25);
  --tx:#18180e;--tx2:#68675e;--tx3:#9a9890;
  --red:#E24B4A;--rbg:#FCEBEB;--rtx:#A32D2D;
  --amb:#EF9F27;--abg:#FAEEDA;--atx:#854F0B;
  --grn:#1D9E75;--gbg:#EAF3DE;--gtx:#3B6D11;
  --blu:#185fa5;--bbg:#E6F1FB;--btx:#185fa5;
  --pur:#7F77DD;--pbg:#EEEDFE;--ptx:#534AB7;
  --tel:#0F6E56;--tbg:#E1F5EE;--ttx:#085041;
  --r:8px;--rl:12px;
  --fn:system-ui,-apple-system,'Segoe UI',sans-serif;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#111110;--sur:#1a1a18;--sur2:#222220;--sur3:#2a2a28;
  --bd:rgba(255,255,255,0.07);--bdm:rgba(255,255,255,0.13);--bds:rgba(255,255,255,0.22);
  --tx:#e4e2da;--tx2:#96948c;--tx3:#56554f;
  --rbg:#501313;--rtx:#F09595;--abg:#412402;--atx:#FAC775;
  --gbg:#173404;--gtx:#97C459;--bbg:#042C53;--btx:#85B7EB;
  --pbg:#26215C;--ptx:#AFA9EC;--tbg:#04342C;--ttx:#5DCAA5;
}}
body{background:var(--bg);color:var(--tx);font-family:var(--fn);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* HEADER */
.hdr{background:var(--sur);border-bottom:0.5px solid var(--bd);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-shrink:0;flex-wrap:wrap}
.hdr-l{display:flex;align-items:center;gap:16px}
.hdr-l h1{font-size:14px;font-weight:600}
.hdr-l p{font-size:11px;color:var(--tx2)}
.filter-row{display:flex;gap:6px;flex-wrap:wrap}
.ftag{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;border:0.5px solid var(--bdm);background:transparent;color:var(--tx2);transition:all .15s;font-family:var(--fn)}
.ftag:hover{border-color:var(--bds)}
.ftag.active{color:#fff;border-color:transparent}
.ftag.f-all.active{background:#555}
.ftag.f-admin.active{background:var(--blu)}
.ftag.f-referee.active{background:var(--red)}
.ftag.f-athlete.active{background:var(--grn)}
.ftag.f-shared.active{background:var(--pur)}

/* MAIN LAYOUT */
.main{display:flex;flex:1;overflow:hidden}

/* LEFT: TABLE LIST */
.sidebar{width:260px;flex-shrink:0;background:var(--sur);border-right:0.5px solid var(--bd);overflow-y:auto;padding:12px 0}
.domain-label{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--tx3);padding:10px 16px 4px}
.domain-label:first-child{padding-top:4px}
.tbl-btn{width:100%;text-align:left;padding:7px 16px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .1s;font-family:var(--fn)}
.tbl-btn:hover{background:var(--sur2)}
.tbl-btn.active{background:var(--sur3)}
.tbl-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.tbl-name{font-size:12px;font-weight:500;color:var(--tx)}
.tbl-count{font-size:10px;color:var(--tx3);margin-left:auto}
.tbl-apps{display:flex;gap:2px;margin-left:4px}
.app-pip{width:5px;height:5px;border-radius:50%}

/* RIGHT: DETAIL PANEL */
.detail{flex:1;overflow-y:auto;padding:20px 24px}

/* OVERVIEW PANEL */
.overview{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-bottom:20px}
.ov-card{background:var(--sur);border:0.5px solid var(--bd);border-radius:var(--rl);padding:14px 16px;cursor:pointer;transition:border-color .15s}
.ov-card:hover{border-color:var(--bdm)}
.ov-domain{font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;margin-bottom:8px}
.ov-tables{display:flex;flex-wrap:wrap;gap:4px}
.ov-tbl{font-size:11px;padding:2px 7px;border-radius:5px;background:var(--sur2);color:var(--tx2)}

/* TABLE DETAIL */
.tbl-header{margin-bottom:16px}
.tbl-title{font-size:20px;font-weight:600;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.tbl-desc{font-size:13px;color:var(--tx2);line-height:1.6;margin-bottom:12px}
.tbl-meta{display:flex;gap:8px;flex-wrap:wrap}
.meta-pill{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500}

/* COLUMNS */
.cols-title{font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--tx2);margin-bottom:8px}
.col-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:20px}
.col-table th{text-align:left;padding:6px 10px;font-size:10px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--tx3);border-bottom:0.5px solid var(--bd)}
.col-table td{padding:7px 10px;border-bottom:0.5px solid var(--bd);vertical-align:top;line-height:1.5}
.col-table tr:last-child td{border-bottom:none}
.col-table tr:hover td{background:var(--sur2)}
.col-name{font-family:'SF Mono','Fira Code',monospace;font-weight:500;color:var(--tx)}
.col-pk{color:var(--amb)}
.col-fk{color:var(--blu)}
.col-type{color:var(--tx3);font-family:'SF Mono','Fira Code',monospace;font-size:11px}
.col-note{color:var(--tx2)}
.badge-pk{background:var(--abg);color:var(--atx);font-size:9px;padding:1px 5px;border-radius:3px;font-weight:600;margin-left:4px}
.badge-fk{background:var(--bbg);color:var(--btx);font-size:9px;padding:1px 5px;border-radius:3px;font-weight:600;margin-left:4px}
.badge-null{background:var(--sur2);color:var(--tx3);font-size:9px;padding:1px 5px;border-radius:3px;margin-left:4px}

/* RELATIONS */
.rel-section{margin-bottom:20px}
.rel-title{font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--tx2);margin-bottom:8px}
.rel-list{display:flex;flex-direction:column;gap:5px}
.rel-item{background:var(--sur);border:0.5px solid var(--bd);border-radius:var(--r);padding:8px 12px;font-size:12px;display:flex;align-items:center;gap:8px;cursor:pointer;transition:border-color .15s}
.rel-item:hover{border-color:var(--bdm)}
.rel-arrow{color:var(--tx3);flex-shrink:0}
.rel-tbl{font-family:'SF Mono','Fira Code',monospace;font-weight:500}
.rel-desc{color:var(--tx2);flex:1}

/* DESIGN NOTES */
.notes-section{background:var(--sur2);border-radius:var(--rl);padding:14px 16px;margin-bottom:20px}
.notes-title{font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--tx2);margin-bottom:8px}
.note-item{font-size:12px;color:var(--tx2);line-height:1.6;display:flex;gap:8px;margin-bottom:6px}
.note-item:last-child{margin-bottom:0}
.note-icon{flex-shrink:0;margin-top:1px}

/* APP ACCESS */
.app-access{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.app-badge{font-size:11px;padding:4px 10px;border-radius:20px;font-weight:500}

/* EDGE FUNCTIONS */
.ef-section{margin-bottom:20px}
.ef-item{background:var(--sur);border:0.5px solid var(--bd);border-radius:var(--r);padding:10px 14px;margin-bottom:6px;font-size:12px}
.ef-name{font-family:'SF Mono','Fira Code',monospace;font-weight:600;color:var(--pur);margin-bottom:4px}
.ef-desc{color:var(--tx2);line-height:1.5}

/* OVERVIEW STATE */
#overview-panel{display:block}
#detail-panel{display:none}
.back-btn{font-size:12px;color:var(--tx2);cursor:pointer;display:flex;align-items:center;gap:4px;margin-bottom:16px;border:none;background:transparent;font-family:var(--fn);padding:0}
.back-btn:hover{color:var(--tx)}

/* DIMMED (filter) */
.tbl-btn.dimmed{opacity:.3}
.ov-card.dimmed{opacity:.25}

@media(max-width:640px){
  .sidebar{width:200px}
  .hdr{padding:10px 14px}
  .detail{padding:14px}
}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-l">
    <div>
      <h1>Pickleball OS — Schema Explorer</h1>
      <p>28 tables · 8 Edge Functions · 3 Realtime channels</p>
    </div>
  </div>
  <div class="filter-row">
    <span style="font-size:11px;color:var(--tx3);align-self:center">Filter:</span>
    <button class="ftag f-all active" onclick="setFilter('all',this)">Tất cả</button>
    <button class="ftag f-admin" onclick="setFilter('admin',this)">Admin Web</button>
    <button class="ftag f-referee" onclick="setFilter('referee',this)">Referee App</button>
    <button class="ftag f-athlete" onclick="setFilter('athlete',this)">Athlete App</button>
    <button class="ftag f-shared" onclick="setFilter('shared',this)">Shared</button>
  </div>
</div>

<div class="main">
  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar"></div>

  <!-- DETAIL -->
  <div class="detail" id="detail">
    <div id="overview-panel"></div>
    <div id="detail-panel" style="display:none"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════

const DOMAINS = [
  { id: 'auth', label: 'Orgs & Users', color: '#7F77DD' },
  { id: 'players', label: 'Players', color: '#185fa5' },
  { id: 'tournaments', label: 'Tournaments', color: '#EF9F27' },
  { id: 'registrations', label: 'Registrations', color: '#E24B4A' },
  { id: 'schedule', label: 'Schedule & Courts', color: '#9c9a90' },
  { id: 'matches', label: 'Matches', color: '#1D9E75' },
  { id: 'bracket', label: 'Bracket & Standings', color: '#0F6E56' },
  { id: 'equipment', label: 'Equipment', color: '#854F0B' },
  { id: 'ai', label: 'AI Content', color: '#534AB7' },
  { id: 'notifications', label: 'Notifications', color: '#6a6960' },
];

// apps: which apps read/write this table
// A=Admin Web, R=Referee App, T=Athlete App
const TABLES = {
  orgs: {
    domain:'auth', apps:['A'],
    desc:'Tổ chức / CLB sử dụng platform. Mỗi org có slug riêng làm URL identifier, plan (free/pro), và settings JSON cho config linh hoạt.',
    notes:['slug là URL subdomain mỗi org, VD: pickleballhn.pickleball-os.vn','plan + plan_expires_at control feature gating — freemium logic','settings JSONB cho phép mở rộng config mà không cần ALTER TABLE'],
    relations:[{dir:'out',tbl:'profiles',desc:'profiles.org_id'},{dir:'out',tbl:'tournaments',desc:'tournaments.org_id'},{dir:'out',tbl:'players',desc:'players.home_org_id'}],
    cols:[
      {n:'id',t:'UUID',pk:true,note:'Primary key'},
      {n:'slug',t:'TEXT',note:'URL identifier duy nhất: "clb-ha-noi"'},
      {n:'name',t:'TEXT',note:'Tên hiển thị: "CLB Pickleball Hà Nội"'},
      {n:'logo_url',t:'TEXT',null:true,note:'Logo cho overlay & scoreboard'},
      {n:'primary_color',t:'TEXT',note:'Brand color mặc định #1D9E75'},
      {n:'plan',t:'TEXT',note:"'free' | 'pro' | 'enterprise'"},
      {n:'plan_expires_at',t:'TIMESTAMPTZ',null:true,note:'NULL = free forever'},
      {n:'settings',t:'JSONB',note:'Flexible org-level config'},
      {n:'deleted_at',t:'TIMESTAMPTZ',null:true,note:'Soft delete'},
    ]
  },
  profiles: {
    domain:'auth', apps:['A','R','T'],
    desc:'Extended user info, quan hệ 1-1 với auth.users của Supabase. Mỗi user đăng ký đều có profile. Role quyết định quyền truy cập.',
    notes:['1-1 với auth.users — Supabase trigger tự tạo khi user đăng ký','org_id NULL nếu là athlete tự do, không thuộc CLB nào','Role: org_admin, org_staff, referee, athlete, super_admin'],
    relations:[{dir:'in',tbl:'auth.users',desc:'Supabase built-in'},{dir:'out',tbl:'orgs',desc:'profiles.org_id'}],
    cols:[
      {n:'id',t:'UUID',pk:true,note:'= auth.users.id'},
      {n:'org_id',t:'UUID',fk:true,null:true,note:'→ orgs — NULL nếu athlete tự do'},
      {n:'role',t:'user_role',note:'Enum: org_admin, org_staff, referee, athlete, super_admin'},
      {n:'full_name',t:'TEXT',note:''},
      {n:'display_name',t:'TEXT',null:true,note:'Tên ngắn hiển thị'},
      {n:'avatar_url',t:'TEXT',null:true,note:''},
      {n:'phone',t:'TEXT',null:true,note:''},
      {n:'date_of_birth',t:'DATE',null:true,note:''},
      {n:'gender',t:'TEXT',null:true,note:"'male' | 'female' | 'other'"},
      {n:'deleted_at',t:'TIMESTAMPTZ',null:true,note:'Soft delete'},
    ]
  },
  org_members: {
    domain:'auth', apps:['A'],
    desc:'Mapping user → org với role cụ thể. 1 user có thể thuộc nhiều org (trọng tài freelance làm cho nhiều CLB).',
    notes:['UNIQUE (org_id, user_id) — mỗi user chỉ có 1 role per org','can_manage_* columns cho phép override role permissions nếu cần granular control','accepted_at NULL = invite chưa được accept'],
    relations:[{dir:'out',tbl:'orgs',desc:'org_members.org_id'},{dir:'out',tbl:'auth.users',desc:'org_members.user_id'}],
    cols:[
      {n:'id',t:'UUID',pk:true,note:''},
      {n:'org_id',t:'UUID',fk:true,note:'→ orgs'},
      {n:'user_id',t:'UUID',fk:true,note:'→ auth.users'},
      {n:'role',t:'user_role',note:'Role trong org này'},
      {n:'can_manage_tournaments',t:'BOOLEAN',note:'Permission override'},
      {n:'can_manage_players',t:'BOOLEAN',note:'Permission override'},
      {n:'can_view_financials',t:'BOOLEAN',note:'Permission override'},
      {n:'invited_at',t:'TIMESTAMPTZ',note:''},
      {n:'accepted_at',t:'TIMESTAMPTZ',null:true,note:'NULL = chưa accept'},
      {n:'deleted_at',t:'TIMESTAMPTZ',null:true,note:'Soft delete'},
    ]
  },
  players: {
    domain:'players', apps:['A','R','T'],
    desc:'Player profile TÁCH KHỎI auth.users. Admin Web tạo trước, Athlete App claim sau bằng email/phone. Referee App đọc tên và ảnh qua match context.',
    notes:['user_id NULL khi chưa claim — Admin Web vẫn hoạt động bình thường','claim_token + claim_expires_at: Athlete App dùng để link account','estimated_rating được tính bởi Edge Function calculate-rating sau mỗi trận','is_claimed = FALSE nghĩa là VĐV chưa dùng Athlete App — vẫn thi đấu được'],
    relations:[
      {dir:'out',tbl:'auth.users',desc:'players.user_id (nullable)'},
      {dir:'out',tbl:'orgs',desc:'players.home_org_id'},
      {dir:'in',tbl:'registrations',desc:'registrations.player1_id / player2_id'},
      {dir:'in',tbl:'player_ratings',desc:'player_ratings.player_id'},
      {dir:'in',tbl:'player_skills',desc:'1-1'},
      {dir:'in',tbl:'player_gear',desc:'player_gear.player_id'},
      {dir:'in',tbl:'player_health',desc:'player_health.player_id'},
      {dir:'in',tbl:'player_certificates',desc:'🆕 player_certificates.player_id'},
    ],
    cols:[
      {n:'id',t:'UUID',pk:true,note:''},
      {n:'user_id',t:'UUID',fk:true,null:true,note:'→ auth.users — NULL khi chưa claim'},
      {n:'full_name',t:'TEXT',note:''},
      {n:'display_name',t:'TEXT',null:true,note:'Tên ngắn trên scoreboard'},
      {n:'avatar_url',t:'TEXT',null:true,note:'Hiển thị trên Referee App khi PIN'},
      {n:'phone',t:'TEXT',null:true,note:'Dùng để claim profile'},
      {n:'email',t:'TEXT',null:true,note:'Dùng để claim profile'},
      {n:'id_number',t:'TEXT',null:true,note:'CCCD/Passport cho giải chính thức'},
      {n:'home_org_id',t:'UUID',fk:true,null:true,note:'→ orgs — CLB chính'},
      {n:'estimated_rating',t:'NUMERIC(4,2)',null:true,note:'DUPR estimate — Edge Function tính'},
      {n:'rating_updated_at',t:'TIMESTAMPTZ',null:true,note:''},
      {n:'is_claimed',t:'BOOLEAN',note:'Đã link với Athlete App chưa'},
      {n:'claim_token',t:'TEXT',null:true,note:'Token để claim profile'},
      {n:'claim_expires_at',t:'TIMESTAMPTZ',null:true,note:'Token hết hạn'},
      {n:'created_by',t:'UUID',fk:true,note:'Admin đã tạo player này'},
      {n:'deleted_at',t:'TIMESTAMPTZ',null:true,note:'Soft delete'},
    ]
  },
  player_ratings: {
    domain:'players', apps:['A','T'],
    desc:'Lịch sử rating — append-only, không bao giờ xóa. Mỗi row là 1 lần rating thay đổi sau trận đấu.',
    notes:['Không có deleted_at — immutable historical record','delta = thay đổi so với lần trước, có thể âm','match_id link về trận gây ra thay đổi rating','Edge Function calculate-rating insert vào đây sau mỗi trận hoàn thành'],
    relations:[{dir:'out',tbl:'players',desc:'player_ratings.player_id'},{dir:'out',tbl:'matches',desc:'player_ratings.match_id'}],
    cols:[
      {n:'id',t:'UUID',pk:true,note:''},
      {n:'player_id',t:'UUID',fk:true,note:'→ players'},
      {n:'rating',t:'NUMERIC(4,2)',note:'Rating tại thời điểm này'},
      {n:'delta',t:'NUMERIC(4,2)',null:true,note:'Thay đổi so với lần trước (+/-)'},
      {n:'reason',t:'TEXT',null:true,note:"'match_result' | 'manual_adjustment'"},
      {n:'match_id',t:'UUID',fk:true,null:true,note:'→ matches — trận gây ra thay đổi'},
      {n:'calculated_at',t:'TIMESTAMPTZ',note:''},
    ]
  },
  player_skills: {
    domain:'players', apps:['T'],
    desc:'Skills tree từ Athlete App — private, chỉ player tự thấy. 8 nhóm kỹ năng (tăng từ 6), mỗi skill score 0–10 với sub-skills chi tiết dưới dạng JSONB.',
    notes:['RLS strict: chỉ player thấy — share_with_btc = TRUE thì org_admin chỉ thấy overall_estimate để seed, không thấy sub-skills','8 categories: mechanics, serve_return, dinking, transition, volleys, strategy + mental_game + fitness (mới)','mental_game: composure, focus, pressure_handling, adaptability, resilience','fitness: stamina, court_speed, reaction_time, lateral_movement, recovery_between_points','JSONB per category → thêm sub-skill mới không cần ALTER TABLE','Lý do private: tránh đối thủ khai thác điểm yếu từ skills data'],
    relations:[{dir:'out',tbl:'players',desc:'1-1, player_skills.player_id'}],
    cols:[
      {n:'id',t:'UUID',pk:true,note:''},
      {n:'player_id',t:'UUID',fk:true,note:'→ players — UNIQUE, quan hệ 1-1'},
      {n:'mechanics',t:'JSONB',note:'stance, grip, footwork, ready_position, split_step'},
      {n:'serve_return',t:'JSONB',note:'deep_serve, serve_placement, power_serve, deep_return, return_consistency'},
      {n:'dinking',t:'JSONB',note:'cross_court_dink, dink_reset, dink_consistency, dink_attack'},
      {n:'transition',t:'JSONB',note:'kitchen_approach, reset_from_mid, third_shot_drop, fifth_shot_drop'},
      {n:'volleys',t:'JSONB',note:'forehand_volley, backhand_volley, overhead_smash, erne, atp, speed_up'},
      {n:'strategy',t:'JSONB',note:'stacking, poaching, third_shot_selection, lob_usage, target_selection'},
      {n:'mental_game',t:'JSONB',note:'🆕 composure, focus, pressure_handling, adaptability, resilience'},
      {n:'fitness',t:'JSONB',note:'🆕 stamina, court_speed, reaction_time, lateral_movement, recovery_between_points'},
      {n:'overall_estimate',t:'NUMERIC(3,1)',null:true,note:'Weighted average → DUPR input'},
      {n:'share_with_btc',t:'BOOLEAN',note:'Consent chia sẻ overall_estimate với Admin. Default FALSE'},
      {n:'updated_at',t:'TIMESTAMPTZ',note:''},
    ]
  },
  player_gear: {
    domain:'players', apps:['T','A'],
    desc:'Gear tracking của VĐV. paddle_id link vào paddles table nếu model có trong DB để auto-validate equipment.',
    notes:['gear_type: paddle, shoes, ball, accessory','paddle_id → paddles: tự động check approved/banned status','is_active = FALSE khi không còn dùng — không hard delete'],
    relations:[{dir:'out',tbl:'players',desc:'player_gear.player_id'},{dir:'out',tbl:'paddles',desc:'player_gear.paddle_id (nullable)'}],
    cols:[
      {n:'id',t:'UUID',pk:true,note:''},
      {n:'player_id',t:'UUID',fk:true,note:'→ players'},
      {n:'gear_type',t:'TEXT',note:"'paddle' | 'shoes' | 'ball' | 'accessory'"},
      {n:'brand',t:'TEXT',null:true,note:''},
      {n:'model',t:'TEXT',null:true,note:''},
      {n:'paddle_id',t:'UUID',fk:true,null:true,note:'→ paddles — auto-validate'},
      {n:'is_active',t:'BOOLEAN',note:'Đang sử dụng hay không'},
      {n:'started_using_at',t:'DATE',null:true,note:''},
      {n:'deleted_at',t:'TIMESTAMPTZ',null:true,note:'Soft delete'},
    ]
  },

let currentFilter = 'all';
let currentTable = null;
const appColors = {A:'var(--blu)',R:'var(--red)',T:'var(--grn)'};
const appNames = {A:'Admin Web',R:'Referee App',T:'Athlete App'};

// ═══════════════════════════════════════════
// RENDER SIDEBAR
// ═══════════════════════════════════════════
function renderSidebar(){
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '';
  DOMAINS.forEach(domain => {
    const tables = Object.entries(TABLES).filter(([,t]) => t.domain === domain.id);
    if(!tables.length) return;
    const lbl = document.createElement('div');
    lbl.className = 'domain-label';
    lbl.textContent = domain.label;
    sb.appendChild(lbl);
    tables.forEach(([key, tbl]) => {
      const btn = document.createElement('button');
      btn.className = 'tbl-btn' + (key === currentTable ? ' active' : '');
      btn.id = 'btn-' + key;
      const dimmed = currentFilter !== 'all' && !matchesFilter(tbl, currentFilter);
      if(dimmed) btn.classList.add('dimmed');
      btn.innerHTML = `
        <span class="tbl-dot" style="background:${domain.color}"></span>
        <span class="tbl-name">${key}</span>
        <span class="tbl-apps">${tbl.apps.map(a=>`<span class="app-pip" style="background:${appColors[a]}" title="${appNames[a]}"></span>`).join('')}</span>
        <span class="tbl-count">${tbl.cols.length}</span>
      `;
      btn.onclick = () => showTable(key);
      sb.appendChild(btn);
    });
  });
}

function matchesFilter(tbl, filter){
  if(filter === 'all') return true;
  if(filter === 'admin') return tbl.apps.includes('A');
  if(filter === 'referee') return tbl.apps.includes('R');
  if(filter === 'athlete') return tbl.apps.includes('T');
  if(filter === 'shared') return tbl.apps.length > 1;
  return true;
}

        <div style="font-size:11px;color:var(--tx2);line-height:1.6">
          Team competitions · VPF rating sync (thêm vpf_player_id) · Mobile notifications · Payment transactions table
        </div>
      </div>
      <div class="ef-item">
        <div style="font-size:11px;font-weight:600;color:var(--rtx);margin-bottom:6px">⚠ Plan trước khi làm</div>
        <div style="font-size:11px;color:var(--tx2);line-height:1.6">
          Multi-region deploy (Supabase read replicas) · Event sourcing đầy đủ · Self-hosted PostgreSQL migration
        </div>
      </div>
      <div class="ef-item">
        <div style="font-size:11px;font-weight:600;color:var(--ptx);margin-bottom:6px">∞ Scale bottleneck timeline</div>
        <div style="font-size:11px;color:var(--tx2);line-height:1.6">
          rally_events: cần partitioning ở ~50M rows (≈3–4 năm) · notifications: archive sau 90 ngày · Tất cả khác: fine cho 5+ năm
        </div>
      </div>
    </div>
  </div>`;

  panel.innerHTML = html;
}

// ═══════════════════════════════════════════
// RENDER TABLE DETAIL
// ═══════════════════════════════════════════
function showTable(key){
  currentTable = key;
  const tbl = TABLES[key];
  const domain = DOMAINS.find(d => d.id === tbl.domain);
  document.getElementById('overview-panel').style.display = 'none';
  const panel = document.getElementById('detail-panel');
  panel.style.display = 'block';

  // App access badges
  const appBadges = tbl.apps.map(a =>
    `<span class="app-badge" style="background:${appColors[a]}22;color:${appColors[a]};border:0.5px solid ${appColors[a]}44">${appNames[a]}</span>`
  ).join('');

  // Columns table
  let colsHtml = `<table class="col-table"><thead><tr>
    <th>Column</th><th>Type</th><th>Notes</th>
  </tr></thead><tbody>`;
  tbl.cols.forEach(col => {
    colsHtml += `<tr>
      <td><span class="col-name ${col.pk?'col-pk':col.fk?'col-fk':''}">${col.n}</span>${col.pk?'<span class="badge-pk">PK</span>':''}${col.fk?'<span class="badge-fk">FK</span>':''}${col.null?'<span class="badge-null">nullable</span>':''}</td>
      <td><span class="col-type">${col.t}</span></td>
      <td><span class="col-note">${col.note}</span></td>
    </tr>`;
  });
  colsHtml += '</tbody></table>';

  // Relations
  let relHtml = '';
  if(tbl.relations && tbl.relations.length){
    relHtml = `<div class="rel-section"><div class="rel-title">Quan hệ với tables khác</div><div class="rel-list">`;
    tbl.relations.forEach(r => {
      const other = TABLES[r.tbl];
      const color = other ? DOMAINS.find(d=>d.id===other.domain)?.color : '#888';
      relHtml += `<div class="rel-item" onclick="${other?`showTable('${r.tbl}')`:''}">
        <span style="font-size:11px;color:var(--tx3)">${r.dir==='out'?'→':'←'}</span>
        <span class="rel-tbl" style="color:${color}">${r.tbl}</span>
        <span class="rel-desc">${r.desc}</span>
      </div>`;
    });
    relHtml += '</div></div>';
  }

  // Design notes
  let notesHtml = '';
  if(tbl.notes && tbl.notes.length){
    notesHtml = `<div class="notes-section"><div class="notes-title">Thiết kế & lý do</div>`;
    tbl.notes.forEach(n => {
      notesHtml += `<div class="note-item"><span class="note-icon">→</span><span>${n}</span></div>`;
    });
    notesHtml += '</div>';
  }

  panel.innerHTML = `
    <button class="back-btn" onclick="showOverview()">← Tất cả tables</button>
    <div class="tbl-header">
      <div class="tbl-title">
        <span style="width:12px;height:12px;border-radius:50%;background:${domain.color};display:inline-block;flex-shrink:0"></span>
        ${key}
        <span style="font-size:13px;color:var(--tx3);font-weight:400">${tbl.cols.length} columns</span>
      </div>
      <div class="tbl-desc">${tbl.desc}</div>
      <div class="app-access">${appBadges}</div>
    </div>
    ${notesHtml}
    <div class="cols-title">Columns</div>
    ${colsHtml}
    ${relHtml}
  `;

  // Update sidebar active
  document.querySelectorAll('.tbl-btn').forEach(b => b.classList.remove('active'));
  const activeBtn = document.getElementById('btn-' + key);
  if(activeBtn) activeBtn.classList.add('active');
}

function showOverview(){
  currentTable = null;
  document.getElementById('overview-panel').style.display = 'block';
  document.getElementById('detail-panel').style.display = 'none';
  document.querySelectorAll('.tbl-btn').forEach(b => b.classList.remove('active'));
}

function showDomain(domainId){
  const first = Object.entries(TABLES).find(([,t]) => t.domain === domainId);
  if(first) showTable(first[0]);
}

function setFilter(f, btn){
  currentFilter = f;
  document.querySelectorAll('.ftag').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderSidebar();
  renderOverview();
  if(currentTable){
    const tbl = TABLES[currentTable];
    if(!matchesFilter(tbl, f)){
      showOverview();
    }
  }
}

// INIT
renderSidebar();
renderOverview();
</script>
</body>
</html>
